name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: isadorameneghetti
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=8b5cf6&color_dots=ebedf0,d8b4fe,c084fc,a855f7,8b5cf6
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=8b5cf6&color_dots=161b22,312e81,6d28d9,7c3aed,8b5cf6

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}