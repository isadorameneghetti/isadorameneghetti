name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate Snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: isadorameneghetti
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=%238b5cf6&color_dots=%23000000,%23ffffff,%23d4d4d4,%239ca3af,%236b7280

      - name: Push Snake
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}